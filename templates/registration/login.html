{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Inventory System{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 80vh; align-items: center;">
    <div class="col-md-6 col-lg-5 col-xl-4" style="margin: 0 auto;">
        <div class="card" style="padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-box" style="margin-bottom: 1rem;">
                    <defs>
                        <linearGradient id="paint0_linear" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3b82f6"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" x2="12" y1="22.08" y2="12"/>
                </svg>
                <h2 style="font-size: 1.75rem; font-weight: 700; color: var(--text-base);">Welcome Back</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.95rem;">Sign in to your account to continue</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-error" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(239, 68, 68, 0.2);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 0.5rem; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="id_username" class="form-label" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Username</label>
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="form-control" placeholder="Enter your username" style="width: 100%; box-sizing: border-box; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.5rem; background: var(--bg-surface); color: var(--text-base); transition: all 0.2s ease;">
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="id_password" class="form-label" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Password</label>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password" class="form-control" placeholder="Enter your password" style="width: 100%; box-sizing: border-box; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.5rem; background: var(--bg-surface); color: var(--text-base); transition: all 0.2s ease;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;">
                    Sign In
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </form>
        </div>
    </div>
</div>
<style>
    /* Styling adjustments to match the theme */
    .form-control:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .navbar {
        display: none !important; /* Hide navbar on login page to enforce full focus */
    }
</style>
{% endblock %}
